services:
  db:
    image: postgres:15-alpine
    container_name: ionbarber_db
    restart: always
    # 👇 A mágica: Agora o banco também lê o seu arquivo secreto!
    env_file:
      - ./backend/.env
    healthcheck:
      # O healthcheck precisa bater com os nomes do .env
      test: ["CMD-SHELL", "pg_isready -U admin_lattech -d ionbarber_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ionbarber_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env